# Written by Brian McCarthy
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: juphc-tc-pipeline
spec:
  params:
  - name: build-image
    type: string
  workspaces:
  - name: pipeline-workspace
  - name: dockerconfig-ws
  tasks:
  - name: clone
    taskRef:
      name: git-clone
    params:
    - name: url
      value: $(params.repo-url)
    - name: revision
      value: $(params.branch)
    workspaces:
    - name: output
      workspace: pipeline-workspace

  - name: npminstall
    taskRef:
      name: npminstall
    runAfter: [clone]
    workspaces:
    - name: source
      workspace: pipeline-workspace

  - name: tests
    taskRef:
      name: jasmine
    runAfter: [npminstall]
    workspaces:
    - name: source
      workspace: pipeline-workspace

  - name: build
    taskRef:
      name: buildah
      kind: ClusterTask
    runAfter: [tests]
    params:
    - name: IMAGE
      value: $(params.build-image)
    workspaces:
    - name: source
      workspace: pipeline-workspace
    - name: dockerconfig
      workspace: dockerconfig-ws
