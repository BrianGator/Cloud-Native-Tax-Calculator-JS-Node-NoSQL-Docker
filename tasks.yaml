apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: clone
spec:
  workspaces:
    - name: output
  params:
    - name: url
      type: string
    - name: revision
      type: string
      default: master
  steps:
    - name: clone
      image: alpine/git
      workingDir: $(workspaces.output.path)
      script: |
        git clone $(params.url) .
        git checkout $(params.revision)
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: npm
spec:
  workspaces:
    - name: source
  params:
    - name: args
      type: array
      default: ["install"]
  steps:
    - name: npm-exec
      image: node:20-buster-slim
      workingDir: $(workspaces.source.path)
      script: |
        npm $(params.args)
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: jasmine
spec:
  workspaces:
    - name: source
  steps:
    - name: test
      image: node:20-buster-slim
      workingDir: $(workspaces.source.path)
      script: |
        npm install
        npx jasmine
